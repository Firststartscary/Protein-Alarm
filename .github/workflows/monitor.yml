name: DC Gallery Monitor

on:
  schedule:
    - cron: '*/5 * * * *'   # 5분마다 실행 (GitHub 서버 상황에 따라 약간 지연될 수 있음)
  workflow_dispatch:         # "Run workflow" 버튼으로 수동 실행도 가능

permissions:
  contents: write            # state 파일을 다시 커밋하기 위해 필요

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: pip install requests beautifulsoup4

      - name: 모니터링 스크립트 실행
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python monitor.py

      - name: 변경된 state 파일 커밋
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add notified_state.json
          git diff --quiet --cached || git commit -m "update notified state"
          git push
